   data-translation="<span style='color:#3d6fad'>짐승의 힘을 사람에게 이식한 그 기술은 너무나 훌륭하지만… 그래서야 모티프에 비해 나은 점이 하나도 없지 않습니까?<br>A splendid technology indeed, to transplant the power of a beast into the human body… But does it offer even a single merit beyond the motif it draws from?<br>(Jimseung-ui him-eul saram-ege isikhan geu gisureun neomuna hullyunghajiman… geuraeseoya motipeu-e bihae na-eun jeomi hanado eopji anseumnikka?)</span>|
   <span style='color:#3d6fad'>임파스토.<br>Impasto.<br>(Impaseuto.)</span>|
   <span style='color:#3d6fad'>당신의 그 미학, 감상해보겠습니다.<br>Allow me a taste of that which you call &quot;aesthetics.&quot;<br>(Dangsin-ui geu mihak, gamsanghaebogetseumnida.)</span>|
   <span style='color:#3d6fad'>장황하군요.<br>Overextended.<br>(Janghwanghagunyo.)</span>|
   <span style='color:#3d6fad'>…단축한 겁니까?<br>... Shortened it, did you?<br>(…Danchukhan geomnikka?)</span>|
   <span style='color:#3d6fad'>나쁘지 않을지도.<br>Not bad, I would say.<br>(Nappeuji aneuljido.)</span>|
   <span style='color:#3d6fad'>음?<br>Hmm?<br>(Eum?)</span>|
   <span style='color:#3d6fad'>허…<br>Hah...<br>(Heo…)</span>|
   <span style='color:#3d6fad'>아쉽군요.<br>A bit underwhelming.<br>(Aswipgunyo.)</span>|
   <span style='color:#3d6fad'>당신들이라면 충분하겠군요. 제가 공들여 꿰맨 애장품을 오래도록 눈에 담을 자격이!<br>You are worthy... of the privilege to behold my prized needlework!<br>(Dangsin-deur-iramyeon chungbunhagetgunyo. Jega gongdeuryeo kkwemaen aejangpumeul oraedorok nune dameul jagyeogi!)</span>|
   <span style='color:#3d6fad'>어디에서도 볼 수 없을 색채로.<br>With a palette of colors out of this world.<br>(Eodieseodo bol su eopseul saekchaero.)</span>|
   <span style='color:#3d6fad'>어중간한 예술은, 물어뜯어 고칠 수밖에!<br>Underdone art... can only be reworked by taking a bite out of it!<br>(Eojungganhan yesureun, mureotteutgo gochil subakke!)</span>"
