	 data-translation="<span style='color:#03b5fc'>자네들의 행동 양상도 파악해두는 편이 좋겠군.<br>It would be for the best if I identified your behavioral patterns now.<br>(Janedeurui haengdong yangsangdo paakhaeduneun pyeoni joketgun.)</span>|

				  <span style='color:#03b5fc'>…여전히 납득하지 못했군. 뭐, 상관없네. 자네의 이해나 동의 따위를 바라고 한 말은 아니었으니.<br>... You still refuse to accept my explanation? Well, it matters not to me. It wasn't said for the sake of your understanding anyway. Or your acceptance, for that matter.<br>(... yeojeonhi napdeukaji mothaetgun. Mwo, sanggwaneomne. Janeui ihaena dongui ttawireul barago han mareun anieosseuni.)</span>|
